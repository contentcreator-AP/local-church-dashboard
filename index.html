<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Local Church · Plan de Contenidos 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
/* ══════════════════════════════════════════
   TOKENS & RESET
══════════════════════════════════════════ */
:root{
  --v:#6B21D6; --vl:#8B45E8; --vd:#1E0950; --vp:#EDE9FE;
  --y:#F5C842; --yd:#C49A10;
  --dark:#08021A; --card:#120528; --card2:#1A0840;
  --brd:rgba(139,69,232,.22); --brd2:rgba(139,69,232,.40);
  --w:#F0EAFF; --gray:#B8A8D8; --gd:#6B5890;
  --grn:#34D399; --org:#F97316; --red:#F87171; --sky:#38BDF8;
  --nav-h:54px; --sub-h:42px;
}
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--w);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--dark);}
::-webkit-scrollbar-thumb{background:var(--vd);border-radius:2px;}

/* ══════════════════════════════════════════
   TOP NAV
══════════════════════════════════════════ */
.topnav{
  position:fixed;top:0;left:0;right:0;z-index:500;
  height:var(--nav-h);background:rgba(8,2,26,.97);
  border-bottom:1px solid var(--brd);backdrop-filter:blur(16px);
  display:flex;align-items:center;gap:8px;padding:0 16px;
}
/* Logo */
.nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer;
  font-weight:900;font-size:.95rem;color:var(--y);white-space:nowrap;
  text-decoration:none;flex-shrink:0;margin-right:4px;}
.nav-logo-mark{width:26px;height:26px;border-radius:6px;background:var(--v);
  display:grid;place-items:center;flex-shrink:0;}
.nav-logo-mark svg{width:14px;height:14px;fill:white;}
/* Nav link buttons — shared base */
.nav-link{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 11px;border-radius:7px;font-size:.68rem;font-weight:700;
  text-decoration:none;white-space:nowrap;flex-shrink:0;
  transition:opacity .18s;border:1px solid transparent;
  font-family:'Nunito',sans-serif;cursor:pointer;
}
.nav-link svg{width:12px;height:12px;fill:currentColor;flex-shrink:0;}
.nav-link:hover{opacity:.8;}
/* Per-service colors */
.nl-sheet {background:rgba(52,211,153,.15);color:#6ee7b7;border-color:rgba(52,211,153,.3);}
.nl-trello{background:rgba(0,121,191,.18);color:#7dd3fc;border-color:rgba(0,121,191,.4);}
.nl-drive {background:rgba(251,188,5,.14);color:#fde047;border-color:rgba(251,188,5,.35);}
.nl-grab    {background:var(--v);color:#fff;border-color:var(--vl);}
.nl-metrics {background:rgba(52,211,153,.12);color:#6ee7b7;border-color:rgba(52,211,153,.3);}
/* Right-side sync pill */
.sync-pill{display:flex;align-items:center;gap:5px;
  font-size:.62rem;font-family:'DM Mono',monospace;color:var(--gd);
  flex-shrink:0;margin-left:auto;}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--y);animation:blink 1.5s infinite;}
.sync-dot.ok {background:var(--grn);animation:none;box-shadow:0 0 5px var(--grn);}
.sync-dot.err{background:var(--red);animation:none;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
/* Hamburger */
.ham{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:5px;flex-shrink:0;}
.ham span{width:19px;height:2px;background:var(--gray);border-radius:1px;}

/* ══════════════════════════════════════════
   MONTH SUBNAV
══════════════════════════════════════════ */
.subnav{
  position:fixed;top:var(--nav-h);left:0;right:0;z-index:400;
  height:var(--sub-h);background:rgba(18,5,40,.97);
  border-bottom:1px solid var(--brd);backdrop-filter:blur(12px);
  display:flex;align-items:center;padding:0 14px;gap:2px;
  overflow-x:auto;scrollbar-width:none;
}
.subnav::-webkit-scrollbar{display:none;}
.mtab{padding:4px 12px;border-radius:20px;font-size:.68rem;font-weight:700;
  cursor:pointer;border:1px solid transparent;color:var(--gd);
  white-space:nowrap;flex-shrink:0;transition:all .18s;text-decoration:none;}
.mtab:hover{color:var(--w);border-color:var(--brd2);}
.mtab.on{background:var(--v);color:#fff;border-color:var(--vl);}

/* ══════════════════════════════════════════
   MOBILE DRAWER
══════════════════════════════════════════ */
.drawer{display:none;position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;
  background:rgba(8,2,26,.98);z-index:450;padding:18px;
  overflow-y:auto;flex-direction:column;gap:5px;}
.drawer.open{display:flex;}
.dr-sec{font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gd);font-family:'DM Mono',monospace;margin:12px 0 5px;}
.dr-link{padding:11px 15px;border-radius:9px;background:var(--card);border:1px solid var(--brd);
  color:var(--w);text-decoration:none;font-size:.82rem;font-weight:600;transition:all .18s;}
.dr-link:hover,.dr-link.on{border-color:var(--vl);background:rgba(107,33,214,.15);}

/* ══════════════════════════════════════════
   MAIN + MONTH VIEW
══════════════════════════════════════════ */
main{padding-top:calc(var(--nav-h) + var(--sub-h));}
.month-view{display:none;}
.month-view.on{display:block;}
.divider{height:1px;background:var(--brd);}

/* ══════════════════════════════════════════
   BUTTONS
══════════════════════════════════════════ */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:8px;font-size:.68rem;font-weight:700;cursor:pointer;
  text-decoration:none;transition:all .18s;border:1px solid transparent;
  white-space:nowrap;font-family:'Nunito',sans-serif;}
.btn svg{width:11px;height:11px;fill:currentColor;}
.btn-v   {background:var(--v);color:#fff;border-color:var(--vl);}
.btn-v:hover{background:var(--vl);}
.btn-g   {background:transparent;color:var(--gray);border-color:var(--brd);}
.btn-g:hover{color:var(--w);border-color:var(--vl);}
.btn-drive{background:rgba(52,211,153,.1);color:var(--grn);border:1px solid rgba(52,211,153,.3);}
.btn-drive:hover{background:rgba(52,211,153,.2);}
.btn-gcal{background:rgba(56,189,248,.1);color:var(--sky);border:1px solid rgba(56,189,248,.3);}
.btn-gcal:hover{background:rgba(56,189,248,.2);}

/* ══════════════════════════════════════════
   LABELS / TYPOGRAPHY
══════════════════════════════════════════ */
.label{font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gd);}
.label.y{color:var(--y);}
.label.v{color:var(--vl);}
.sec-title{font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gd);font-family:'DM Mono',monospace;
  border-bottom:1px solid var(--brd);padding-bottom:7px;}
.sec-hdr{display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:22px;gap:14px;flex-wrap:wrap;}
.sec-big{font-size:1.35rem;font-weight:800;margin-top:3px;}
.hdr-btns{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}

/* ══════════════════════════════════════════
   PORTADA DEL MES
══════════════════════════════════════════ */
.portada{display:grid;grid-template-columns:1fr 1fr;min-height:90vh;
  border-bottom:1px solid var(--brd);}
.portada-l{padding:52px 48px;display:flex;flex-direction:column;
  justify-content:space-between;border-right:1px solid var(--brd);
  position:relative;overflow:hidden;}
.portada-l::after{content:'';position:absolute;bottom:-80px;left:-80px;
  width:360px;height:360px;border-radius:50%;
  background:radial-gradient(circle,rgba(107,33,214,.22) 0%,transparent 68%);
  pointer-events:none;}
.portada-tag{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.portada-tag::before{content:'';width:20px;height:2px;background:var(--y);border-radius:1px;}
/* Month name — SINGLE LINE */
.month-name{font-size:clamp(3.2rem,9vw,6.5rem);font-weight:900;
  line-height:.88;letter-spacing:-.05em;color:var(--w);
  white-space:nowrap;}
.month-year{font-size:.75rem;font-weight:700;color:var(--vl);
  margin-top:10px;letter-spacing:.18em;text-transform:uppercase;
  font-family:'DM Mono',monospace;}
.month-serie{display:none;}
/* Stats grid */
.portada-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;
  background:var(--brd);border:1px solid var(--brd);border-radius:12px;
  overflow:hidden;margin-top:28px;}
.pstat{padding:14px 18px;background:var(--card);}
.pstat-n{font-size:1.9rem;font-weight:900;color:var(--y);
  font-family:'DM Mono',monospace;line-height:1;}
.pstat-l{font-size:.56rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--gd);margin-top:3px;}
/* Right panel */
.portada-r{padding:52px 48px;display:flex;flex-direction:column;gap:20px;}
/* Ciclo nav buttons */
.ciclo-nav-list{display:flex;flex-direction:column;gap:3px;}
.ciclo-nav-btn{display:grid;grid-template-columns:62px 1fr auto;align-items:center;
  gap:10px;padding:10px 13px;border-radius:9px;background:var(--card);
  border:1px solid var(--brd);text-decoration:none;color:inherit;
  cursor:pointer;transition:all .18s;}
.ciclo-nav-btn:hover{border-color:var(--vl);background:var(--card2);}
.cn-num{font-size:.62rem;font-weight:700;color:var(--vl);font-family:'DM Mono',monospace;}
.cn-name{font-size:.78rem;font-weight:700;color:var(--w);}
.cn-dates{font-size:.58rem;color:var(--gd);font-family:'DM Mono',monospace;}
/* Pills */
.tag-pills{display:flex;flex-wrap:wrap;gap:5px;}
.tpill{padding:3px 9px;border-radius:20px;font-size:.62rem;font-weight:700;
  background:rgba(107,33,214,.2);border:1px solid var(--v);color:var(--gray);}
.tpill.y{background:rgba(245,200,66,.12);border-color:var(--yd);color:var(--y);}

/* ══════════════════════════════════════════
   CALENDARIO
══════════════════════════════════════════ */
.cal-section{display:grid;grid-template-columns:1fr 210px;
  border-bottom:1px solid var(--brd);}
.cal-main{padding:38px 30px;border-right:1px solid var(--brd);}
/* Calendar grid: 8 cols (week label + 7 days) */
.cal{display:grid;grid-template-columns:88px repeat(7,1fr);gap:1px;
  background:var(--brd);border:1px solid var(--brd);border-radius:11px;overflow:hidden;}
.cal-dh{background:var(--vd);padding:6px 5px;font-size:.53rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--gray);
  font-family:'DM Mono',monospace;text-align:center;}
/* Week label cell */
.cal-wk-lbl{background:rgba(107,33,214,.16);border-right:1px solid var(--brd);
  padding:7px 8px;display:flex;flex-direction:column;justify-content:center;gap:3px;
  cursor:pointer;text-decoration:none;color:inherit;transition:background .18s;min-height:70px;}
.cal-wk-lbl:hover{background:rgba(107,33,214,.26);}
.wkl-num{font-size:.56rem;font-weight:800;color:var(--vl);font-family:'DM Mono',monospace;}
.wkl-fase{font-size:.5rem;color:var(--gd);font-weight:600;}
.wkl-name{font-size:.6rem;font-weight:700;color:var(--gray);line-height:1.3;word-break:break-word;}
/* Day cells */
.cal-day{background:var(--card);padding:6px 5px;min-height:70px;}
.cal-day.other-month{background:rgba(8,2,26,.5);}
.cal-dn{font-size:.6rem;font-family:'DM Mono',monospace;color:var(--gd);
  margin-bottom:3px;display:block;}
/* Pills in calendar */
.cal-pill{display:block;padding:1px 4px;border-radius:3px;font-size:.52rem;
  font-weight:700;margin-bottom:2px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:100%;}
/* ── CANAL COLORS — sólidos, máximo contraste ── */
.cp-ig {background:#C13584;color:#fff;}   /* Instagram  — fucsia      */
.cp-fb {background:#1877F2;color:#fff;}   /* Facebook   — azul        */
.cp-yt {background:#CC0000;color:#fff;}   /* YouTube    — rojo        */
.cp-tk {background:#161617;color:#69C9D0;outline:1px solid #69C9D0;} /* TikTok */
.cp-sp {background:#1DB954;color:#fff;}   /* Spotify    — verde       */
.cp-wa {background:#128C7E;color:#fff;}   /* WhatsApp   — verde oscuro*/
.cp-ml {background:#4F46E5;color:#fff;}   /* Mail       — índigo      */
.cp-ex {background:#0E7490;color:#fff;}   /* Experiencia— teal        */
.cp-or {background:#EA580C;color:#fff;}   /* Local Casa — naranja     */
.cp-pan{background:#7C3AED;color:#fff;}   /* Pantallas  — violeta     */
/* Calendar legend */
.cal-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;align-items:center;}
.cl-item{display:none;}
/* Sidebar */
.cal-sidebar{padding:28px 18px;display:flex;flex-direction:column;gap:7px;}
.cal-sidebar .sec-title{font-size:.54rem;}
.ciclo-side-btn{padding:9px 11px;border-radius:8px;background:var(--card);
  border:1px solid var(--brd);cursor:pointer;text-decoration:none;
  color:inherit;transition:all .18s;display:block;}
.ciclo-side-btn:hover{border-color:var(--vl);background:var(--card2);}
.csb-num{font-size:.56rem;font-weight:700;color:var(--vl);font-family:'DM Mono',monospace;}
.csb-name{font-size:.7rem;font-weight:700;color:var(--w);margin-top:2px;}
.csb-fase{font-size:.58rem;color:var(--gd);margin-top:1px;}

/* ══════════════════════════════════════════
   CICLO SLIDE (portadilla)
══════════════════════════════════════════ */
.ciclo-slide{display:grid;grid-template-columns:1fr 2fr;
  min-height:72vh;border-bottom:1px solid var(--brd);}
.ciclo-left{padding:48px 42px;border-right:1px solid var(--brd);
  display:flex;flex-direction:column;justify-content:space-between;}
.ciclo-big{font-size:clamp(4rem,11vw,8.5rem);font-weight:900;line-height:.82;
  color:rgba(139,69,232,.16);letter-spacing:-.08em;font-family:'DM Mono',monospace;}
.ciclo-title{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:900;line-height:1.1;margin-top:10px;}
.ciclo-title span{color:var(--y);}
.ciclo-meta{margin-top:14px;display:flex;flex-direction:column;gap:5px;}
.ciclo-meta-row{display:flex;align-items:flex-start;gap:7px;font-size:.78rem;color:var(--gd);}
.ciclo-meta-row strong{color:var(--gray);font-weight:600;}
.ciclo-btns-row{margin-top:18px;display:flex;gap:6px;flex-wrap:wrap;}
.ciclo-right{padding:38px 34px;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:9px;margin-top:16px;}
.product-card{background:var(--card);border:1px solid var(--brd);border-radius:9px;
  padding:13px;cursor:pointer;transition:all .18s;text-decoration:none;color:inherit;}
.product-card:hover{border-color:var(--vl);background:var(--card2);transform:translateY(-1px);}
.pc-id{font-size:.6rem;font-weight:700;color:var(--vl);font-family:'DM Mono',monospace;}
.pc-tema{font-size:.72rem;font-weight:700;color:var(--w);margin-top:3px;line-height:1.3;}
.pc-meta{display:flex;align-items:center;gap:5px;margin-top:7px;flex-wrap:wrap;}
.pc-date{font-size:.56rem;color:var(--gd);font-family:'DM Mono',monospace;}
.pc-estado{display:flex;align-items:center;gap:3px;margin-top:5px;}
.estado-bar{display:flex;gap:2px;}
.eb{width:13px;height:3px;border-radius:2px;background:rgba(107,33,214,.22);}
.eb.done{background:var(--vl);}
.eb.now{background:var(--y);}

/* ══════════════════════════════════════════
   FORMATO TAGS
══════════════════════════════════════════ */
.fmt-tag{padding:2px 8px;border-radius:20px;font-size:.58rem;font-weight:800;text-transform:uppercase;}
.fmt-post    {background:rgba(107,33,214,.5);color:#c4a8ff;border:1px solid rgba(139,69,232,.6);}
.fmt-reel    {background:rgba(245,200,66,.2);color:var(--y);border:1px solid rgba(245,200,66,.5);}
.fmt-historia{background:rgba(52,211,153,.15);color:#6ee7b7;border:1px solid rgba(52,211,153,.4);}
.fmt-cinta,.fmt-banner{background:rgba(192,132,252,.16);color:#e9d5ff;border:1px solid rgba(192,132,252,.4);}
.fmt-carrete {background:rgba(249,115,22,.15);color:#fdba74;border:1px solid rgba(249,115,22,.4);}
.fmt-mail    {background:rgba(99,102,241,.16);color:#c4b5fd;border:1px solid rgba(99,102,241,.4);}
.fmt-audio   {background:rgba(244,114,182,.16);color:#fbcfe8;border:1px solid rgba(244,114,182,.4);}
.fmt-video   {background:rgba(253,224,71,.15);color:#fde047;border:1px solid rgba(253,224,71,.4);}
.fmt-impreso {background:rgba(167,243,208,.15);color:#a7f3d0;border:1px solid rgba(167,243,208,.4);}

/* ══════════════════════════════════════════
   CANAL TAGS (fichas)
══════════════════════════════════════════ */
.canal-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:20px;font-size:11px;font-weight:500;
  background:rgba(107,33,214,0.18);border:1px solid var(--brd);color:var(--gray);}
.ct-ig {background:#C13584;color:#fff;}
.ct-fb {background:#1877F2;color:#fff;}
.ct-yt {background:#CC0000;color:#fff;}
.ct-tk {background:#161617;color:#69C9D0;outline:1px solid #69C9D0;}
.ct-sp {background:#1DB954;color:#fff;}
.ct-wa {background:#128C7E;color:#fff;}
.ct-ml {background:#4F46E5;color:#fff;}
.ct-pa {background:#7C3AED;color:#fff;}
.ct-wb {background:#0284C7;color:#fff;}
.canales-wrap{display:flex;gap:4px;flex-wrap:wrap;}

/* ══════════════════════════════════════════
   FICHA SLIDE
══════════════════════════════════════════ */
.ficha-slide{min-height:100vh;padding:60px;border-top:1px solid var(--brd);
  display:flex;flex-direction:column;}
.ficha-slide-hdr{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;flex-wrap:wrap;gap:9px;}
.ficha-slide-lbl{font-size:.58rem;font-weight:700;letter-spacing:.16em;
  text-transform:uppercase;color:var(--vl);font-family:'DM Mono',monospace;}
.ficha-count{font-size:.62rem;color:var(--gd);font-family:'DM Mono',monospace;}
/* GRP banner */
.grp-bar{display:flex;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:8px;}
.grp-id-badge{background:var(--y);color:var(--dark);font-family:'DM Mono',monospace;
  font-size:11px;font-weight:700;letter-spacing:.1em;padding:6px 14px;border-radius:6px 0 0 6px;}
.grp-name-badge{background:rgba(245,200,66,.1);border:1px solid rgba(245,200,66,.35);border-left:none;
  color:var(--y);font-size:12px;font-weight:600;padding:6px 16px;border-radius:0 6px 6px 0;letter-spacing:.04em;}
.grp-pips{display:flex;gap:5px;align-items:center;margin-left:6px;}
.gpip{width:8px;height:8px;border-radius:50%;background:var(--gd);border:1px solid var(--brd);}
.gpip.on{background:var(--y);border-color:var(--y);}
.gpip.here{background:var(--vl);border-color:var(--vl);box-shadow:0 0 6px var(--vl);}
.gpip-lbl{font-size:10px;color:var(--gd);margin-left:8px;font-family:'DM Mono',monospace;}
/* Two-col layout */
.ficha-layout{display:grid;grid-template-columns:1fr 320px;gap:18px;flex:1;}
/* Main card */
.ficha-card{background:var(--card);border:1px solid var(--brd);border-radius:13px;
  overflow:hidden;display:flex;flex-direction:column;}
.ficha-topbar{padding:11px 16px;background:rgba(107,33,214,.2);
  border-bottom:1px solid var(--brd);display:flex;align-items:center;
  justify-content:space-between;flex-wrap:wrap;gap:7px;}
.ficha-np{font-family:'DM Mono',monospace;font-size:.82rem;font-weight:700;
  color:var(--w);letter-spacing:.06em;}
/* Body grid */
.ficha-body{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--brd);flex:1;}
.fc{background:var(--card);padding:14px 18px;}
.fc.wide{grid-column:1/-1;}
.fc-lbl{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;
  color:var(--gd);font-family:'DM Mono',monospace;margin-bottom:7px;}
.fc-val{font-size:13px;color:var(--w);line-height:1.5;}
.fc-val.date{color:var(--y);font-family:'DM Mono',monospace;font-size:.72rem;}
.fc-val.copy{font-size:12px;color:var(--gray);line-height:1.6;
  background:rgba(255,255,255,0.03);padding:10px 12px;border-radius:6px;
  border-left:2px solid var(--v);white-space:pre-wrap;}
.fc-val.cap{font-size:.74rem;color:var(--gray);line-height:1.6;

.fc-val.ajuste{font-size:.73rem;color:var(--org);

.img-zone{width:100%;aspect-ratio:16/9;max-height:160px;

.img-zone:hover{background:rgba(107,33,214,.13);border-color:var(--vl);color:var(--gray);}

.proceso{display:flex;flex-direction:column;gap:4px;}

.ps.now{background:rgba(245,200,66,0.10);border:1px solid rgba(245,200,66,0.25);}
.ps.pend{opacity:.35;}
.ps-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;

.ps-icon.done{background:var(--grn);color:var(--dark);}
.ps-icon.now{background:var(--y);color:var(--dark);}
.ps-icon.pend{background:rgba(107,33,214,.2);border:1px solid var(--brd);color:var(--gd);}
.ps-txt{font-size:11px;color:var(--gray);font-weight:500;}
.ps-txt.now{color:var(--y);font-weight:600;}

.a-id{font-family:'DM Mono',monospace;font-size:.56rem;color:var(--gd);}
.adapt-row.here .a-fmt{color:var(--w);font-weight:700;}
.adapt-row.here .a-id{color:var(--vl);}

.meta-rows{display:flex;flex-direction:column;gap:6px;}
.meta-row{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
.meta-k{font-size:9px;color:var(--gd);text-transform:uppercase;
  letter-spacing:.12em;font-family:'DM Mono',monospace;flex-shrink:0;}
.meta-v{font-size:13px;color:var(--w);font-weight:500;}
.meta-v.y{color:var(--y);font-family:'DM Mono',monospace;font-weight:700;}

══════════════════════════════════════════ */

// ════════════════════════════════════════════════════════
// CONFIGURACIÓN — PEGA AQUÍ LA URL DEL APPS SCRIPT
// ════════════════════════════════════════════════════════
// 1. Abre tu Google Sheet
// 2. Extensiones → Apps Script → pega Apps_Script_API.js → guarda
// 3. Implementar → Nueva implementación → Aplicación web
//    Quién tiene acceso: "Cualquier persona" → copiar URL
// 4. Pega esa URL entre las comillas de abajo:
const API_URL = "https://script.google.com/macros/s/AKfycbwieBUvLy8xAr9DYp14TRGRZQ62v_uctHCldfb5VXdpSvcRLb_asy7YM6q-rL0HG3lb1g/exec";
// ════════════════════════════════════════════════════════

const SHEET_ID   = "1Lf0qEoSk6UaqVajaXKs8z_RDtQ6KKbOZjH3_svcvY3U";
const SHEET_URL  = "https://docs.google.com/spreadsheets/d/1Lf0qEoSk6UaqVajaXKs8z_RDtQ6KKbOZjH3_svcvY3U/edit#gid=0";
const SHEET_NAMES = { parrilla:"Parrilla de Contenidos", grabaciones:"Plan de Grabación", metricas:"Métricas" };
const PARRILLA_COLS = ["id","grupo","tema","mes","ciclo","fase","fecha","hora","canal","formato","audiencia","objetivo","copy","caption","cta","estado","ajustes","responsable","linkDrive","notas"];
// SHEET_URL points to the "Parrilla de Contenidos" tab (gid=0) of the matriz document.
// When you install the API (Apps_Script_API.js) in THIS document, the dashboard
// will auto-populate all ciclo product cards from the "Parrilla de Contenidos" sheet.
const ESTADO_STEPS = ["Pendiente","En revisión","Revisado","Ajustado","Aprobado"];

// Fases estratégicas Local Church 2026
const FASES_LC = [
  {id:"vitrina",    label:"Vitrina / Experiencias",     color:"rgba(139,69,232,.85)", icon:"🏛"},
  {id:"quienes",    label:"¿Quiénes Somos?",            color:"rgba(245,200,66,.85)", icon:"🌟"},
  {id:"academia",   label:"Crecer en tu fe / Academia",  color:"rgba(56,189,248,.85)", icon:"🎓"},
  {id:"conecta",    label:"Local Conecta",               color:"rgba(52,211,153,.85)", icon:"🤝"},
  {id:"casa",       label:"Local en Casa",               color:"rgba(249,115,22,.85)", icon:"🏠"},
  {id:"voluntarios",label:"Voluntarios",                 color:"rgba(244,114,182,.85)",icon:"🙌"},
];
function faseMeta(faseStr){
  const s = (faseStr||"").toLowerCase();
  if(s.includes("vitrina")||s.includes("experiencia")) return FASES_LC[0];
  if(s.includes("quién")||s.includes("somos"))          return FASES_LC[1];
  if(s.includes("academ")||s.includes("crecer"))         return FASES_LC[2];
  if(s.includes("conecta"))                              return FASES_LC[3];
  if(s.includes("casa"))                                 return FASES_LC[4];
  if(s.includes("voluntar"))                             return FASES_LC[5];
  return {id:"vitrina",label:faseStr,color:"rgba(139,69,232,.85)",icon:"📌"};
}

// CANAL → CSS class map ──────────────────────────
const CANAL_CLASS = {
  "instagram":"ct-ig","facebook":"ct-fb","youtube":"ct-yt","tiktok":"ct-tk",
  "spotify":"ct-sp","whatsapp":"ct-wa","mail":"ct-ml","pantallas":"ct-pa","web":"ct-wb",
  "app":"ct-wb",
};
const CANAL_CAL_CLASS = {
  "instagram":"cp-ig","facebook":"cp-fb","youtube":"cp-yt","tiktok":"cp-tk",
  "spotify":"cp-sp","whatsapp":"cp-wa","mail":"cp-ml","pantallas":"cp-or",
  "experiencia":"cp-ex","local en casa":"cp-or",
};

};

function canalClass(canal){

  return CANAL_CLASS[k] || "ct-wb";
}
const CANAL_ICON = {
  "instagram":"📸","facebook":"👤","youtube":"▶️","tiktok":"🎵",
  "spotify":"🎧","whatsapp":"💬","mail":"✉️","pantallas":"🖥",
  "web":"🌐","app":"📱",
};
function canalIcon(canal){
  const k = (canal||"").toLowerCase().split("·")[0].split(",")[0].split(" ")[0].trim();
  return CANAL_ICON[k] || "📡";
}
function calClass(canal){
  const k = (canal||"").toLowerCase().split("·")[0].split(",")[0].split(" ")[0].trim();
  return CANAL_CAL_CLASS[k] || "cp-ex";
}

// FORMAT CLASS ───────────────────────────────────
function fmtClass(f){
  const s = (f||"").toLowerCase().trim();
  if(s.includes("post"))     return "fmt-post";
  if(s.includes("reel"))     return "fmt-reel";
  if(s.includes("historia")) return "fmt-historia";
  if(s.includes("cinta")||s.includes("banner")) return "fmt-cinta";
  if(s.includes("carrete"))  return "fmt-carrete";
  if(s.includes("mail"))     return "fmt-mail";
  if(s.includes("audio"))    return "fmt-audio";
  if(s.includes("video"))    return "fmt-video";
  if(s.includes("impreso"))  return "fmt-impreso";
  return "fmt-post";
}
function fmtIcon(f){
  const m={"post":"🖼","reel":"🎬","historia":"📱","cinta":"🎞","banner":"🎞","carrete":"📷","mail":"✉️","audio":"🎙️","video":"📹","impreso":"🖨️"};
  const k = (f||"").toLowerCase().split(" ")[0].split("/")[0].split("·")[0].trim();
  return m[k]||"📄";
}
function tipoGrabClass(t){
  const m={"Grabación":"tipo-grab","En Vivo":"tipo-vivo","Pre-producción":"tipo-pre","Edición":"tipo-edit"};
  return m[t]||"tipo-grab";
}

// ESTADO HELPERS
function estadoIdx(e){ return Math.max(0,ESTADO_STEPS.indexOf(e)); }
function renderProceso(estado){
  const idx=estadoIdx(estado);
  const LABELS=["Pendiente","En revisión","Revisado","Ajustado","Aprobado"];
  const parts=[];
  for(let i=0;i<LABELS.length;i++){
    const cls=i<idx?"done":i===idx?"now":"pend";
    const icon=i<idx?"✓":i===idx?"→":"○";
    const nc=i===idx?" now":"";
    parts.push('<div class="ps '+cls+'"><div class="ps-icon '+cls+'">'+icon+'</div><div class="ps-txt'+nc+'">'+LABELS[i]+'</div></div>');
  }
  return parts.join("");
}
function renderEstadoBar(estado,total){total=total||4;const idx=estadoIdx(estado);const parts=[];for(let i=0;i<total;i++){const c=i<idx?"done":i===idx?"now":"";parts.push('<div class="eb '+c+'"></div>');}return parts.join("");
}

// GCAL LINK
function gcalLink(title, dateStr){
  const clean = encodeURIComponent(title);
  return `https://calendar.google.com/calendar/r/eventedit?text=${clean}&dates=${dateStr}&location=Teatro+Libre+Bogot%C3%A1&sf=true&output=xml`;
}

// GROUP BY GRP
function groupByGRP(piezas){
  const g = {};
  piezas.forEach(p=>{ const k = p.grupo||("_"+p.id); if(!g[k])g[k]=[]; g[k].push(p); });
  return g;
}

// ── CALENDARIO ─────────────────────────────────────
function renderCalendario(id, meta, piezas){
  const {startDay, totalDays, ciclos} = meta;
  const DAYS = ["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
  const next = MONTH_ORDER[MONTH_ORDER.indexOf(id)+1];

  // Map piezas by day
  const pizMap = {};
  piezas.forEach(p=>{
    const d = parseInt((p.fecha||"").split("/")[0]);
    if(d){ if(!pizMap[d])pizMap[d]=[]; pizMap[d].push(p); }
  });
  // Map activities by day
  const actMap = meta.actividades||{};

  // Determine ciclo per day
  const cicloForDay = (day)=>{
    const weekIdx = Math.floor((day + startDay - 1)/7);
    return ciclos[Math.min(weekIdx, ciclos.length-1)];
  };

  // Week names — editable via global week name manager
  const defaultWeekNames = ciclos.map(c=>`C${c.num} · ${c.tema}`);
  const weekNames = (window.LC_WEEK_NAMES && window.LC_WEEK_NAMES[id]) || defaultWeekNames;

  // New grid: 8 columns (week-label + 7 days), 4 week-rows + header row
  // Use CSS grid with 8 cols
  let calHtml = `<div class="cal" style="grid-template-columns:auto repeat(7,1fr)">`;
  // Header row: blank + day names
  calHtml += `<div class="cal-dh" style="border-radius:8px 0 0 0"></div>`;
  DAYS.forEach((d,i)=>calHtml+=`<div class="cal-dh"${i===6?' style="border-radius:0 8px 0 0"':''}>${d}</div>`);

  // 4 week rows
  for(let w=0;w<4;w++){
    const c = ciclos[w]||{num:w+1,fase:"",tema:""};
    const wname = weekNames[w]||defaultWeekNames[w];
    // Week label cell — editable
    calHtml += `
    <a href="#ciclo-${id}-${c.num}" class="cal-wk-lbl"
       data-month="${id}" data-widx="${w}"
       title="Doble clic para editar · Clic para ir al ciclo">
      <span class="wkl-num">C·${String(c.num).padStart(2,"0")}</span>
      <span class="wkl-fase">${c.fase}</span>
      <span class="wkl-name">${wname}</span>
    </a>`;
    // 7 day cells for this week
    for(let dd=0;dd<7;dd++){
      const day = w*7 + dd - startDay + 1;
      const isValid = day>=1&&day<=totalDays;
      calHtml += `<div class="cal-day${!isValid?" other-month":""}">`;
      if(isValid){
        calHtml += `<span class="cal-dn">${day}</span>`;
        (actMap[String(day)]||[]).forEach(a=>{
          calHtml += `<span class="cal-pill ${calClass(a.c)}">${a.e.substring(0,20)}</span>`;
        });
        (pizMap[day]||[]).slice(0,2).forEach(p=>{
          calHtml += `<span class="cal-pill ${calClass(p.canal)}">${(p.tema||"").split("·")[0].trim().substring(0,18)}</span>`;
        });
      }
      calHtml += `</div>`;
    }
  }
  calHtml += `</div>`;

  // Script to make week labels editable (injected after render)


  // Legend
  const channels = [
    {l:"Instagram",    cl:"cp-ig"},
    {l:"Facebook",     cl:"cp-fb"},
    {l:"YouTube",      cl:"cp-yt"},
    {l:"TikTok",       cl:"cp-tk"},
    {l:"Spotify",      cl:"cp-sp"},
    {l:"WhatsApp",     cl:"cp-wa"},
    {l:"Mail",         cl:"cp-ml"},
    {l:"Experiencia",  cl:"cp-ex"},
    {l:"Local en Casa",cl:"cp-or"},
    {l:"Pantallas",    cl:"cp-pan"},
  ];

  return `
  <section id="cal-${id}" class="cal-section">
    <div class="cal-main">
      <div class="sec-hdr">
        <div><div class="label v">Calendario mensual</div><div class="sec-big">${meta.label} ${meta.year}</div></div>
        <div class="hdr-btns">
          <a href="#portada-${id}" class="btn btn-g">↑ Portada</a>
          ${next?`<button class="btn btn-v" onclick="showMonth('${next}')">${MONTHS_META[next].label} →</button>`:""}
        </div>
      </div>
      ${calHtml}

function renderFicha(p, grpPiezas, thisIdx, slideNum, totalSlides, id){
  const step = estadoIdx(p.estado);
  const isMulti = grpPiezas.length>1;
  const canales = (p.canal||"").split("·").join(",").split(",").map(c=>c.trim()).filter(Boolean);
  const pipsHtml = isMulti ? grpPiezas.map((_,k)=>`<div class="gpip ${k===thisIdx?"here":"on"}"></div>`).join("")+
    `<span class="gpip-lbl">${grpPiezas.length} adaptaciones · ${thisIdx+1}/${grpPiezas.length}</span>` : "";
  const adaptHtml = isMulti ? grpPiezas.map((ap,k)=>
    k===thisIdx
      ?`<div class="adapt-row here"><span class="a-fmt">${fmtIcon(ap.formato)} ${ap.formato}</span><span class="a-id">${ap.id} ← esta</span></div>`
      :`<a href="#pieza-${ap.id.replace(/\s/g,"-")}" class="adapt-row"><span class="a-fmt">${fmtIcon(ap.formato)} ${ap.formato}</span><span class="a-id">${ap.id} →</span></a>`
  ).join("") : "";
  const driveHref = (p.linkDrive && p.linkDrive.length>2) ? p.linkDrive : "https://drive.google.com";
  const driveEl = `<a href="${driveHref}" target="_blank" style="
      display:flex;align-items:center;justify-content:center;gap:8px;

      </svg>

  return `

      </div>
      <div class="ficha-count">${slideNum} / ${totalSlides}</div>
    </div>

    ${isMulti?`<div class="grp-bar"><div class="grp-id-badge">${p.grupo}</div><div class="grp-name-badge">${p.tema}</div><div class="grp-pips">${pipsHtml}</div></div>`:""}

    <div class="ficha-layout">
      <div class="ficha-card">
        <div class="ficha-topbar">
          <span class="ficha-np">${p.id}</span>

            <div class="fc-val date">${p.fecha}${p.hora?" · "+p.hora:""}</div>

          <div class="fc">
            <div class="fc-lbl">Audiencia</div>
            <div class="fc-val">${p.audiencia||"—"}</div>
          </div>
          <div class="fc">
            <div class="fc-lbl">Objetivo</div>
            <div class="fc-val">${p.objetivo||"—"}</div>

          </div>
          <div class="fc wide">

            <div class="fc-val cap">${p.caption||"N/A"}</div>
          </div>
          <div class="fc">
            <div class="fc-lbl">Fase</div>
            <div class="fc-val">${p.fase||"—"}</div>

          <div class="fc">
            <div class="fc-lbl">CTA</div>
            <div class="fc-val">${p.cta||"—"}</div>

        <div class="scard">

            <div class="meta-row"><span class="meta-k">Salida</span><span class="meta-v y">${(()=>{ const d=p.fecha.split("/"); return d.length===3?d[0]+" / "+["ENE","FEB","MAR","ABR","MAY","JUN","JUL","AGO","SEP","OCT","NOV","DIC"][parseInt(d[1])-1]+" "+d[2]:p.fecha; })()}</span></div>
          </div>
        </div>
        <div class="scard">
          <div class="scard-t">Archivo</div>
          <div class="drive-btn-wrap">${driveEl}</div>
        </div>
      </div>
    </div>
  </section>`;
}

// BUILD MONTH
// ══════════════════════════════════════════════════
function buildMonth(id, apiPiezas){
  const meta   = MONTHS_META[id];
  const prev   = MONTH_ORDER[MONTH_ORDER.indexOf(id)-1];
  const next   = MONTH_ORDER[MONTH_ORDER.indexOf(id)+1];

  // Use API data if available, else embedded
  let piezas = [];
  if(apiPiezas && apiPiezas.length>0){
    piezas = apiPiezas.filter(p=>{ const m=(p.fecha||"").split("/")[1]; return m&&parseInt(m)===parseInt(meta.num); });
  }
  if(piezas.length===0 && meta.piezas && meta.piezas.length>0){
    piezas = meta.piezas;
  }

  let html = `<section class="month-view" id="month-${id}">`;

  // 1. PORTADA
  html += renderPortada(id, meta, piezas);
  html += `<div class="divider"></div>`;

  // 2. CALENDARIO
  html += renderCalendario(id, meta, piezas);
  html += `<div class="divider"></div>`;

  // 3+4. CICLOS + FICHAS
  meta.ciclos.forEach((c,ci)=>{
    const prevC = ci>0?meta.ciclos[ci-1]:null;
    const nextC = ci<meta.ciclos.length-1?meta.ciclos[ci+1]:null;
    const cicloNum = String(c.num);
    const cicPiezas = piezas.filter(p=>parseInt((p.ciclo||"").replace(/\D/g,""),10)===parseInt(cicloNum,10));

    // Ciclo portadilla
    html += renderCicloSlide(id, meta, c, cicPiezas, prevC, nextC, !nextC, next);
    html += `<div class="divider"></div>`;

    // Fichas individuales
    const grps = groupByGRP(cicPiezas);
    const allOrdered = [];
    Object.values(grps).forEach(g=>g.forEach(p=>allOrdered.push(p)));
    let sc = 0;
    Object.values(grps).forEach(grpPiezas=>{
      grpPiezas.forEach((p,pi)=>{
        sc++;
        html += renderFicha(p, grpPiezas, pi, sc, allOrdered.length, id);
        html += `<div class="divider"></div>`;
      });
    });
  });

  // 5. GRABACIONES
  html += renderGrabaciones(id, meta);
  html += `<div class="divider"></div>`;

  // 6. MÉTRICAS
  html += renderMetricas(id, meta);

  html += `</section>`;
  return html;
}

// ── GLOBAL WEEK NAME EDITOR ─────────────────────────────────────
// Called via dblclick on .cal-wk-lbl elements (set by renderCalendario)
window.LC_WEEK_NAMES = {};

function initWeekEditing(){
  document.querySelectorAll('.cal-wk-lbl').forEach(function(lbl){
    const mid   = lbl.getAttribute('data-month');
    const widx  = parseInt(lbl.getAttribute('data-widx'));
    const nameEl = lbl.querySelector('.wkl-name');
    if(!mid || isNaN(widx) || !nameEl) return;
    lbl.addEventListener('dblclick', function(e){
      e.preventDefault();
      const storageKey = 'lc-weeknames-' + mid;
      const saved = JSON.parse(localStorage.getItem(storageKey)||'null');
      const cur = (saved && saved[widx]) || nameEl.textContent;
      const inp = document.createElement('input');
      inp.value = cur;
      inp.style.cssText='width:100%;background:rgba(107,33,214,.35);border:1px solid #8B45E8;border-radius:4px;color:#fff;font-size:.6rem;font-family:Nunito,sans-serif;padding:3px 5px;outline:none;';
      nameEl.replaceWith(inp);
      inp.focus(); inp.select();
      function save(){
        const all = JSON.parse(localStorage.getItem(storageKey)||'null') || [];
        all[widx] = inp.value || cur;
        localStorage.setItem(storageKey, JSON.stringify(all));
        if(!window.LC_WEEK_NAMES[mid]) window.LC_WEEK_NAMES[mid] = [];
        window.LC_WEEK_NAMES[mid][widx] = inp.value || cur;
        const sp = document.createElement('span');
        sp.className = 'wkl-name';
        sp.textContent = inp.value || cur;
        inp.replaceWith(sp);
      }
      inp.addEventListener('blur', save);
      inp.addEventListener('keydown', function(ev){
        if(ev.key==='Enter') save();
        if(ev.key==='Escape'){ const sp=document.createElement('span'); sp.className='wkl-name'; sp.textContent=cur; inp.replaceWith(sp); }
      });
    });
    // Load saved name on init
    const storageKey = 'lc-weeknames-' + mid;
    const saved = JSON.parse(localStorage.getItem(storageKey)||'null');
    if(saved && saved[widx]){ nameEl.textContent = saved[widx]; }
  });
}

// ── GOOGLE SHEETS DIRECT READER ─────────────────────────────────
// Reads public Sheet directly via CSV export — no Apps Script needed
// Requires: Sheet shared as "Anyone with link can VIEW"
async function fetchSheetCSV(sheetName){
  const encoded = encodeURIComponent(sheetName);
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encoded}`;
  const res = await fetch(url);
  if(!res.ok) throw new Error(`Error leyendo hoja "${sheetName}": ${res.status}`);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text){
  const lines = text.split(/\r?\n/).filter(l=>l.trim());
  return lines.map(line=>{
    const cells = [];
    let cur="", inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){ if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ; }
      else if(ch===','&&!inQ){ cells.push(cur.trim()); cur=""; }
      else cur+=ch;
    }
    cells.push(cur.trim());
    return cells;
  });
}

function csvToPiezas(rows){
  // Find header row (contains "ID Pieza" or "id")
  let hdrIdx = rows.findIndex(r=>
    r.some(c=>c.toLowerCase().includes("id pieza")||c.toLowerCase()==="id")
  );
  if(hdrIdx<0) hdrIdx=3; // default: row 4 (0-indexed: 3)
  const headers = rows[hdrIdx].map(h=>h.toLowerCase().replace(/[^a-z \t\xc0-\xff]/gi,"").trim());

  // Map header names to our field names
  const COL_MAP = {
    "id pieza":"id","id":"id","grupo grp":"grupo","grupo":"grupo",
    "nombre del tema":"tema","tema":"tema",
    "mes":"mes","ciclo":"ciclo","fase":"fase",
    "fecha salida":"fecha","fecha":"fecha","hora":"hora",
    "canal":"canal","formato":"formato","audiencia":"audiencia","objetivo":"objetivo",
    "copy  guión":"copy","copy guión":"copy","copy":"copy",
    "caption":"caption","cta":"cta","estado":"estado",
    "ajustes solicitados":"ajustes","ajustes":"ajustes",
    "responsable":"responsable","link drive":"linkDrive","link":"linkDrive","notas":"notas",
  };
  const colIdx = {};
  headers.forEach((h,i)=>{
    // Try exact match first, then partial
    if(COL_MAP[h]) colIdx[COL_MAP[h]]=i;
    else {
      Object.entries(COL_MAP).forEach(([k,v])=>{
        if(!colIdx[v] && h.includes(k.split(" ")[0])) colIdx[v]=i;
      });
    }
  });

  const piezas=[];
  for(let i=hdrIdx+1;i<rows.length;i++){
    const row=rows[i];
    if(!row[colIdx["id"]||0]) continue;
    const p={};
    Object.entries(colIdx).forEach(([field,ci])=>{ p[field]=(row[ci]||"").trim(); });
    if(p.id) piezas.push(p);
  }
  return piezas;
}

function csvToGrabaciones(rows){
  let hdrIdx=rows.findIndex(r=>r.some(c=>c.toLowerCase().includes("sesión")||c.toLowerCase().includes("sesion")));
  if(hdrIdx<0) hdrIdx=1;
  const hdrs=rows[hdrIdx].map(h=>h.toLowerCase());
  const find=(k)=>hdrs.findIndex(h=>h.includes(k));
  const iMes=find("mes"),iFec=find("fecha"),iSes=find("sesión")||find("sesion")||find("nombre"),
        iTipo=find("tipo"),iEnc=find("encargado"),iEnt=find("entrega"),iEst=find("estado");
  const grabs=[];
  for(let i=hdrIdx+1;i<rows.length;i++){
    const r=rows[i];
    if(!r[iFec]) continue;
    grabs.push({
      mes:r[iMes]||"",fecha:r[iFec]||"",sesion:r[iSes]||"",
      tipo:r[iTipo]||"",encargado:r[iEnc]||"",entrega:r[iEnt]||"",
      estado:r[iEst]||"Pendiente",
    });
  }
  return grabs;
}

// ── INIT ─────────────────────────────────────────────────────────
async function init(){
  const dot = document.getElementById("sdot");
  const lbl = document.getElementById("slbl");

  // Always build Abril immediately with embedded data
  document.getElementById("main").innerHTML = buildMonth("abril", null);
  BUILT["abril"] = true;
  document.getElementById("month-abril").classList.add("on");
  window.LC_METRICAS = {
    instagram:[{mes:"Abril",seguidores:5350,alcance:12400,impresiones:38000,engagement:"4.2%"}],
    facebook: [{mes:"Abril",seguidores:468, alcance:2100, impresiones:8900, engagement:"1.8%"}],
    youtube:  [{mes:"Abril",suscriptores:1240,vistas:3800,horas_vistas:420,watch_time:"2:45"}],
    whatsapp: [{mes:"Abril",contactos:320,mensajes_enviados:280,tasa_apertura:"91%",respuestas:45}],
    mail:     [{mes:"Abril",suscriptores:240,enviados:238,abiertos:"34%",clics:"6%",bajas:2}],
  };
  setTimeout(()=>{
    initCharts("abril",MONTHS_META["abril"],MONTHS_META["abril"].piezas||[]);
    initWeekEditing();
    populateMetricas("abril",window.LC_METRICAS);
  },200);

  // ── Conectar con Apps Script ──────────────────────────────────
  const isReady = API_URL && API_URL !== "PEGA_URL_AQUI";
  if(!isReady){
    dot.className="sync-dot ok";
    lbl.textContent="Datos locales · instala la API para sincronizar";
    return;
  }

  try{
    lbl.textContent="Conectando…";
    const res  = await fetch(API_URL);
    if(!res.ok) throw new Error("HTTP "+res.status);
    const json = await res.json();
    if(json.status!=="ok") throw new Error(json.message||"Error en la API");
    dot.className="sync-dot ok";
    lbl.textContent="Sincronizado · "+new Date(json.updated).toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"});
    window.LC_METRICAS = json.metricas || window.LC_METRICAS;
    _rebuildWithData(json.data||[], json.grabaciones||[]);
  }catch(err){
    dot.className="sync-dot err";
    lbl.textContent="Error: "+err.message.substring(0,40);
    console.error("API error:", err);
  }
}

function _rebuildWithData(piezas, grabs){
  // Rebuild Abril with live data
  const el=document.getElementById("month-abril");
  if(el) el.remove();
  BUILT["abril"]=false;
  // Inject grabaciones into meta
  if(grabs.length>0){
    const grabAbril=grabs.filter(g=>(g.mes||"").toLowerCase()==="abril");
    if(grabAbril.length>0) MONTHS_META.abril.grabaciones=grabAbril;
  }
  showMonth("abril",false);
  setTimeout(()=>{
    MONTH_ORDER.forEach(mid=>{
      if(BUILT[mid]&&window.LC_METRICAS) populateMetricas(mid,window.LC_METRICAS);
    });
  },400);
}

init();
// Initialize external links (Trello, Drive) after DOM ready
setTimeout(()=>{ initExtLinks(); setupExtLinkEditing(); }, 200);
</script>
