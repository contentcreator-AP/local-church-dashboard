<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Local Church · Parrilla Abril 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  /* Brand purple */
  --v:#6B21D6;--vl:#8B45E8;--vd:#4C1597;--vp:#EDE9FE;
  /* Accent */
  --y:#7C3AED;--yd:#5B21B6;
  /* Light theme surfaces */
  --dark:#FFFFFF;          /* page background */
  --card:#F8F6FF;          /* card surface */
  --card2:#F0EBFF;         /* card hover / alt */
  /* Borders */
  --brd:rgba(107,33,214,.14);--brd2:rgba(107,33,214,.30);
  /* Text */
  --w:#1A0A2E;             /* primary text — very dark purple */
  --gray:#4B3B6B;          /* secondary text */
  --gd:#7C6FA0;            /* muted text */
  /* Status */
  --grn:#059669;--org:#EA580C;--red:#DC2626;--sky:#0284C7;
  --nav-h:54px;--sub-h:42px;
}
*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}
body{font-family:'Nunito',sans-serif;background:#FFFFFF;color:var(--w);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:#f3f0ff;}
::-webkit-scrollbar-thumb{background:#c4b5fd;border-radius:2px;}

/* NAV */
.topnav{position:fixed;top:0;left:0;right:0;z-index:500;height:var(--nav-h);
  background:rgba(255,255,255,.97);border-bottom:1px solid var(--brd);backdrop-filter:blur(16px);
  display:flex;align-items:center;gap:8px;padding:0 16px;
  box-shadow:0 1px 12px rgba(107,33,214,.08);}
.nav-logo{display:flex;align-items:center;gap:8px;cursor:pointer;font-weight:900;font-size:.95rem;
  color:var(--v);white-space:nowrap;text-decoration:none;flex-shrink:0;margin-right:4px;}
.nav-logo-mark{width:26px;height:26px;border-radius:6px;background:var(--v);
  display:grid;place-items:center;flex-shrink:0;}
.nav-logo-mark svg{width:14px;height:14px;fill:white;}
.nav-link{display:inline-flex;align-items:center;gap:5px;padding:5px 11px;border-radius:7px;
  font-size:.68rem;font-weight:700;text-decoration:none;white-space:nowrap;flex-shrink:0;
  transition:opacity .18s;border:1px solid transparent;font-family:'Nunito',sans-serif;cursor:pointer;}
.nav-link svg{width:12px;height:12px;fill:currentColor;flex-shrink:0;}
.nav-link:hover{opacity:.75;}
.nl-sheet{background:rgba(5,150,105,.1);color:#065F46;border-color:rgba(5,150,105,.25);}
.nl-trello{background:rgba(0,82,204,.1);color:#1D4ED8;border-color:rgba(0,82,204,.25);}
.nl-drive{background:rgba(234,88,12,.1);color:#9A3412;border-color:rgba(234,88,12,.25);}
.nl-grab{background:var(--v);color:#fff;border-color:var(--vd);}
.nl-metrics{background:rgba(5,150,105,.1);color:#065F46;border-color:rgba(5,150,105,.25);}
.sync-pill{display:flex;align-items:center;gap:5px;font-size:.62rem;
  font-family:'DM Mono',monospace;color:var(--gd);flex-shrink:0;margin-left:auto;}
.sync-dot{width:5px;height:5px;border-radius:50%;background:#7C3AED;animation:blink 1.5s infinite;}
.sync-dot.ok{background:var(--grn);animation:none;box-shadow:0 0 5px rgba(5,150,105,.4);}
.sync-dot.err{background:var(--red);animation:none;}
.sync-dot.wait{background:#7C3AED;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.ham{display:none;flex-direction:column;gap:4px;cursor:pointer;padding:5px;flex-shrink:0;}
.ham span{width:19px;height:2px;background:var(--gray);border-radius:1px;}

/* SUBNAV */
.subnav{position:fixed;top:var(--nav-h);left:0;right:0;z-index:400;height:var(--sub-h);
  background:rgba(255,255,255,.97);border-bottom:1px solid var(--brd);backdrop-filter:blur(12px);
  display:flex;align-items:center;padding:0 14px;gap:2px;overflow-x:auto;scrollbar-width:none;
  box-shadow:0 1px 8px rgba(107,33,214,.05);}
.subnav::-webkit-scrollbar{display:none;}
.mtab{padding:4px 12px;border-radius:20px;font-size:.68rem;font-weight:700;cursor:pointer;
  border:1px solid transparent;color:var(--gd);white-space:nowrap;flex-shrink:0;
  transition:all .18s;text-decoration:none;}
.mtab:hover{color:var(--v);border-color:var(--brd2);}
.mtab.on{background:var(--v);color:#fff;border-color:var(--vd);}

/* DRAWER */
.drawer{display:none;position:fixed;top:var(--nav-h);left:0;right:0;bottom:0;
  background:rgba(255,255,255,.98);z-index:450;padding:18px;overflow-y:auto;
  flex-direction:column;gap:5px;}
.drawer.open{display:flex;}
.dr-sec{font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gd);font-family:'DM Mono',monospace;margin:12px 0 5px;}
.dr-link{padding:11px 15px;border-radius:9px;background:var(--card);border:1px solid var(--brd);
  color:var(--w);text-decoration:none;font-size:.82rem;font-weight:600;transition:all .18s;}
.dr-link:hover,.dr-link.on{border-color:var(--v);background:var(--vp);color:var(--v);}

/* SETUP BANNER */
.setup-banner{background:#F5F3FF;border:1px solid rgba(107,33,214,.25);
  border-radius:12px;padding:18px 22px;margin:20px;display:flex;flex-wrap:wrap;
  gap:14px;align-items:flex-start;}
.sb-title{font-size:.9rem;font-weight:800;color:var(--v);margin-bottom:6px;}
.sb-text{font-size:.75rem;color:var(--gray);line-height:1.7;}
.sb-input{flex:1;min-width:260px;background:#fff;border:1.5px solid var(--brd2);
  border-radius:8px;color:var(--w);font-size:.8rem;padding:9px 13px;
  font-family:'Nunito',sans-serif;outline:none;transition:border-color .2s;}
.sb-input:focus{border-color:var(--v);}
.sb-input::placeholder{color:var(--gd);}
.sb-btn{background:var(--v);color:#fff;border:none;border-radius:8px;padding:9px 18px;
  font-size:.78rem;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif;
  transition:background .18s;white-space:nowrap;}
.sb-btn:hover{background:var(--vl);}

main{padding-top:calc(var(--nav-h) + var(--sub-h));}
.month-view{display:none;}
.month-view.on{display:block;}
.divider{height:1px;background:var(--brd);}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:8px;
  font-size:.68rem;font-weight:700;cursor:pointer;text-decoration:none;transition:all .18s;
  border:1px solid transparent;white-space:nowrap;font-family:'Nunito',sans-serif;}
.btn svg{width:11px;height:11px;fill:currentColor;}
.btn-v{background:var(--v);color:#fff;border-color:var(--vd);}
.btn-v:hover{background:var(--vl);}
.btn-g{background:#fff;color:var(--gray);border-color:var(--brd2);}
.btn-g:hover{color:var(--v);border-color:var(--v);}
.btn-drive{background:rgba(5,150,105,.08);color:#065F46;border:1px solid rgba(5,150,105,.25);}
.btn-drive:hover{background:rgba(5,150,105,.15);}
.btn-gcal{background:rgba(2,132,199,.08);color:#0369A1;border:1px solid rgba(2,132,199,.25);}
.btn-gcal:hover{background:rgba(2,132,199,.15);}
.btn-dl{background:rgba(107,33,214,.08);color:var(--v);border:1px solid rgba(107,33,214,.2);}
.btn-dl:hover{background:rgba(107,33,214,.15);}

/* TYPOGRAPHY */
.label{font-size:.58rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--gd);}
.label.y{color:var(--v);}
.label.v{color:var(--v);}
.sec-title{font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;
  color:var(--gd);font-family:'DM Mono',monospace;border-bottom:1px solid var(--brd);padding-bottom:7px;}
.sec-hdr{display:flex;align-items:flex-start;justify-content:space-between;
  margin-bottom:22px;gap:14px;flex-wrap:wrap;}
.sec-big{font-size:1.35rem;font-weight:800;margin-top:3px;color:var(--w);}
.hdr-btns{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}

/* PORTADA */
.portada{display:grid;grid-template-columns:1fr 1fr;min-height:90vh;border-bottom:1px solid var(--brd);}
.portada-l{padding:52px 48px;display:flex;flex-direction:column;justify-content:space-between;
  border-right:1px solid var(--brd);position:relative;overflow:hidden;background:#F5F3FF;}
.portada-l::after{content:'';position:absolute;bottom:-80px;left:-80px;width:360px;height:360px;
  border-radius:50%;background:radial-gradient(circle,rgba(107,33,214,.1) 0%,transparent 68%);pointer-events:none;}
.portada-tag{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.portada-tag::before{content:'';width:20px;height:2px;background:var(--v);border-radius:1px;}
.month-name{font-size:clamp(3.2rem,9vw,6.5rem);font-weight:900;line-height:.88;
  letter-spacing:-.05em;color:var(--v);white-space:nowrap;}
.month-year{font-size:.75rem;font-weight:700;color:var(--vl);margin-top:10px;
  letter-spacing:.18em;text-transform:uppercase;font-family:'DM Mono',monospace;}
.portada-stats{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--brd);
  border:1px solid var(--brd);border-radius:12px;overflow:hidden;margin-top:28px;}
.pstat{padding:14px 18px;background:#fff;}
.pstat-n{font-size:1.9rem;font-weight:900;color:var(--v);font-family:'DM Mono',monospace;line-height:1;}
.pstat-l{font-size:.56rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--gd);margin-top:3px;}
.portada-r{padding:52px 48px;display:flex;flex-direction:column;gap:20px;background:#fff;}
.ciclo-nav-list{display:flex;flex-direction:column;gap:3px;}
.ciclo-nav-btn{display:grid;grid-template-columns:62px 1fr auto;align-items:center;gap:10px;
  padding:10px 13px;border-radius:9px;background:#F8F6FF;border:1px solid var(--brd);
  text-decoration:none;color:inherit;cursor:pointer;transition:all .18s;}
.ciclo-nav-btn:hover{border-color:var(--v);background:#EDE9FE;}
.cn-num{font-size:.62rem;font-weight:700;color:var(--v);font-family:'DM Mono',monospace;}
.cn-name{font-size:.78rem;font-weight:700;color:var(--w);}
.cn-dates{font-size:.58rem;color:var(--gd);font-family:'DM Mono',monospace;}
.tag-pills{display:flex;flex-wrap:wrap;gap:5px;}
.tpill{padding:3px 9px;border-radius:20px;font-size:.62rem;font-weight:700;
  background:rgba(107,33,214,.08);border:1px solid rgba(107,33,214,.2);color:var(--v);}
.tpill.y{background:rgba(107,33,214,.15);border-color:var(--v);color:var(--v);}

/* CALENDAR */
.cal-section{display:grid;grid-template-columns:1fr 210px;border-bottom:1px solid var(--brd);}
.cal-main{padding:38px 30px;border-right:1px solid var(--brd);}
.cal{display:grid;grid-template-columns:88px repeat(7,1fr);gap:1px;
  background:var(--brd);border:1px solid var(--brd);border-radius:11px;overflow:hidden;}
.cal-dh{background:var(--v);padding:6px 5px;font-size:.53rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:#fff;
  font-family:'DM Mono',monospace;text-align:center;}
.cal-wk-lbl{background:#EDE9FE;border-right:1px solid var(--brd);
  padding:7px 8px;display:flex;flex-direction:column;justify-content:center;gap:3px;
  cursor:pointer;text-decoration:none;color:inherit;transition:background .18s;min-height:70px;}
.cal-wk-lbl:hover{background:#DDD6FE;}
.wkl-num{font-size:.56rem;font-weight:800;color:var(--v);font-family:'DM Mono',monospace;}
.wkl-fase{font-size:.5rem;color:var(--gd);font-weight:600;}
.wkl-name{font-size:.6rem;font-weight:700;color:var(--w);line-height:1.3;word-break:break-word;}
.cal-day{background:#fff;padding:6px 5px;min-height:70px;}
.cal-day.other-month{background:#FAFAFA;}
.cal-dn{font-size:.6rem;font-family:'DM Mono',monospace;color:var(--gd);margin-bottom:3px;display:block;}
.cal-pill{display:block;padding:1px 4px;border-radius:3px;font-size:.52rem;font-weight:700;
  margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
.cp-ig{background:#C13584;color:#fff;}
.cp-fb{background:#1877F2;color:#fff;}
.cp-yt{background:#CC0000;color:#fff;}
.cp-tk{background:#161617;color:#69C9D0;outline:1px solid #69C9D0;}
.cp-sp{background:#1DB954;color:#fff;}
.cp-wa{background:#128C7E;color:#fff;}
.cp-ml{background:#4F46E5;color:#fff;}
.cp-ex{background:#0E7490;color:#fff;}
.cp-or{background:#EA580C;color:#fff;}
.cp-pan{background:#7C3AED;color:#fff;}
.cal-legend{display:flex;flex-wrap:wrap;gap:6px;margin-top:14px;align-items:center;}
.cal-sidebar{padding:28px 18px;display:flex;flex-direction:column;gap:7px;background:#FAFAFA;}
.cal-sidebar .sec-title{font-size:.54rem;}
.ciclo-side-btn{padding:9px 11px;border-radius:8px;background:#fff;border:1px solid var(--brd);
  cursor:pointer;text-decoration:none;color:inherit;transition:all .18s;display:block;}
.ciclo-side-btn:hover{border-color:var(--v);background:#EDE9FE;}
.csb-num{font-size:.56rem;font-weight:700;color:var(--v);font-family:'DM Mono',monospace;}
.csb-name{font-size:.7rem;font-weight:700;color:var(--w);margin-top:2px;}
.csb-fase{font-size:.58rem;color:var(--gd);margin-top:1px;}

/* CICLO SLIDE */
.ciclo-slide{display:grid;grid-template-columns:1fr 2fr;min-height:72vh;border-bottom:1px solid var(--brd);}
.ciclo-left{padding:48px 42px;border-right:1px solid var(--brd);display:flex;flex-direction:column;justify-content:space-between;background:#F5F3FF;}
.ciclo-big{font-size:clamp(4rem,11vw,8.5rem);font-weight:900;line-height:.82;
  color:rgba(107,33,214,.1);letter-spacing:-.08em;font-family:'DM Mono',monospace;}
.ciclo-title{font-size:clamp(1.6rem,4vw,2.6rem);font-weight:900;line-height:1.1;margin-top:10px;}
.ciclo-title span{color:var(--v);}
.ciclo-meta{margin-top:14px;display:flex;flex-direction:column;gap:5px;}
.ciclo-meta-row{display:flex;align-items:flex-start;gap:7px;font-size:.78rem;color:var(--gd);}
.ciclo-meta-row strong{color:var(--gray);font-weight:600;}
.ciclo-btns-row{margin-top:18px;display:flex;gap:6px;flex-wrap:wrap;}
.ciclo-right{padding:38px 34px;background:#fff;}
.products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;margin-top:16px;}
.product-card{background:#F8F6FF;border:1px solid var(--brd);border-radius:9px;padding:13px;
  cursor:pointer;transition:all .18s;text-decoration:none;color:inherit;}
.product-card:hover{border-color:var(--v);background:#EDE9FE;transform:translateY(-1px);}
.pc-id{font-size:.6rem;font-weight:700;color:var(--v);font-family:'DM Mono',monospace;}
.pc-tema{font-size:.72rem;font-weight:700;color:var(--w);margin-top:3px;line-height:1.3;}
.pc-meta{display:flex;align-items:center;gap:5px;margin-top:7px;flex-wrap:wrap;}
.pc-date{font-size:.56rem;color:var(--gd);font-family:'DM Mono',monospace;}
.pc-estado{display:flex;align-items:center;gap:3px;margin-top:5px;}
.estado-bar{display:flex;gap:2px;}
.eb{width:13px;height:3px;border-radius:2px;background:rgba(107,33,214,.15);}
.eb.done{background:var(--v);}
.eb.now{background:#7C3AED;}

/* FORMATO TAGS */
.fmt-tag{padding:2px 8px;border-radius:20px;font-size:.58rem;font-weight:800;text-transform:uppercase;}
.fmt-post{background:rgba(107,33,214,.12);color:#5B21B6;border:1px solid rgba(107,33,214,.25);}
.fmt-reel{background:rgba(234,88,12,.1);color:#9A3412;border:1px solid rgba(234,88,12,.25);}
.fmt-historia{background:rgba(5,150,105,.1);color:#065F46;border:1px solid rgba(5,150,105,.25);}
.fmt-mail{background:rgba(79,70,229,.1);color:#3730A3;border:1px solid rgba(79,70,229,.25);}
.fmt-video{background:rgba(202,138,4,.1);color:#92400E;border:1px solid rgba(202,138,4,.25);}
.fmt-stories{background:rgba(5,150,105,.1);color:#065F46;border:1px solid rgba(5,150,105,.25);}
.fmt-carrusel{background:rgba(234,88,12,.1);color:#9A3412;border:1px solid rgba(234,88,12,.25);}
.fmt-pauta{background:rgba(2,132,199,.1);color:#0369A1;border:1px solid rgba(2,132,199,.25);}
.fmt-transmision{background:rgba(185,28,28,.1);color:#991B1B;border:1px solid rgba(185,28,28,.25);}

/* CANAL TAGS */
.canal-tag{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:600;background:rgba(107,33,214,.08);border:1px solid var(--brd);color:var(--v);}
.ct-ig{background:#C13584;color:#fff;}
.ct-fb{background:#1877F2;color:#fff;}
.ct-yt{background:#CC0000;color:#fff;}
.ct-tk{background:#1A1A1A;color:#69C9D0;outline:1px solid #69C9D0;}
.ct-sp{background:#1DB954;color:#fff;}
.ct-wa{background:#128C7E;color:#fff;}
.ct-ml{background:#4F46E5;color:#fff;}
.ct-pa{background:#7C3AED;color:#fff;}
.ct-wb{background:#0284C7;color:#fff;}
.canales-wrap{display:flex;gap:4px;flex-wrap:wrap;}

/* FICHA SLIDE */
.ficha-slide{min-height:100vh;padding:60px;border-top:1px solid var(--brd);display:flex;flex-direction:column;}
.ficha-slide-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:9px;}
.ficha-slide-lbl{font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;
  color:var(--vl);font-family:'DM Mono',monospace;}
.ficha-count{font-size:.62rem;color:var(--gd);font-family:'DM Mono',monospace;}
.ficha-layout{display:grid;grid-template-columns:1fr 280px;gap:18px;margin-top:18px;}
.ficha-card{background:var(--card);border:1px solid var(--brd);border-radius:14px;overflow:hidden;}
.ficha-topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;
  background:rgba(107,33,214,.12);border-bottom:1px solid var(--brd);}
.ficha-np{font-size:.72rem;font-weight:800;color:var(--vl);font-family:'DM Mono',monospace;}
.ficha-topbar-r{display:flex;align-items:center;gap:7px;}
.ficha-body{display:grid;grid-template-columns:1fr 1fr;gap:0;border-top:1px solid var(--brd);}
.fc{padding:14px 18px;border-bottom:1px solid var(--brd);border-right:1px solid var(--brd);}
.fc:nth-child(even){border-right:none;}
.fc.wide{grid-column:1/-1;border-right:none;}
.fc-lbl{font-size:.55rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--gd);margin-bottom:6px;}
.fc-val{font-size:.82rem;color:var(--gray);line-height:1.5;}
.fc-val.copy,.fc-val.cap{font-size:.78rem;line-height:1.7;white-space:pre-wrap;}
.fc-val.date{font-family:'DM Mono',monospace;color:var(--vl);}
.fc-val.ajuste{color:var(--y);font-size:.78rem;}
.img-zone{height:160px;border-top:1px solid var(--brd);display:flex;align-items:center;
  justify-content:center;background:rgba(107,33,214,.05);}
.img-zone-inner{text-align:center;color:var(--gd);}
.ficha-side{display:flex;flex-direction:column;gap:12px;}
.proceso-card{background:var(--card);border:1px solid var(--brd);border-radius:12px;padding:16px;}
.proceso-steps{display:flex;flex-direction:column;gap:7px;margin-top:12px;}
.ps{display:flex;align-items:center;gap:9px;font-size:.72rem;color:var(--gd);padding:5px 0;}
.ps-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.6rem;flex-shrink:0;background:rgba(107,33,214,.18);border:1px solid var(--brd);}
.ps.done .ps-icon{background:var(--grn);border-color:var(--grn);color:#fff;}
.ps.now .ps-icon{background:var(--v);border-color:var(--vd);color:#fff;}
.ps.pend .ps-icon{background:#EDE9FE;}
.ps-txt{color:var(--gd);}
.ps-txt.now{color:var(--v);font-weight:700;}
.ps.done .ps-txt{color:var(--gray);}

/* GRABACIONES */
.grab-section{padding:52px 48px;border-bottom:1px solid var(--brd);background:#fff;}
.grab-table{width:100%;border-collapse:collapse;margin-top:16px;}
.grab-table th{background:#F5F3FF;padding:9px 13px;font-size:.6rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;color:var(--v);text-align:left;
  border-bottom:2px solid var(--brd);}
.grab-table td{padding:10px 13px;font-size:.75rem;border-bottom:1px solid var(--brd);

  const pendientes=piezas.filter(p=>p.estado==="Pendiente").length;
  const canales=[...new Set(piezas.map(p=>p.canal.split("/")[0].trim()))].slice(0,4);
  return `
  <section id="portada-${id}" class="portada">
    <div class="portada-l">
      <div>
        <div class="portada-tag"><div class="label">Plan de Contenidos · Local Church</div></div>

          ${meta.predicadores.map(p=>`<span class="tpill">${p}</span>`).join("")}

      </div>
      <div class="portada-stats">
        <div class="pstat"><div class="pstat-n">${total}</div><div class="pstat-l">Piezas totales</div></div>
        <div class="pstat"><div class="pstat-n">${aprobadas}</div><div class="pstat-l">Aprobadas</div></div>
        <div class="pstat"><div class="pstat-n">${enProceso}</div><div class="pstat-l">En proceso</div></div>
        <div class="pstat"><div class="pstat-n">${pendientes}</div><div class="pstat-l">Pendientes</div></div>
      </div>
    </div>
    <div class="portada-r">
      <div>
        <div class="sec-title">Ciclos del mes</div>
        <div class="ciclo-nav-list" style="margin-top:14px">
          ${meta.ciclos.map(c=>`
          <a href="#ciclo-${id}-${c.num}" class="ciclo-nav-btn">
            <div class="cn-num">CICLO ${String(c.num).padStart(2,"0")}</div>
            <div><div class="cn-name">${c.tema}</div><div class="cn-dates">${c.sem}</div></div>

// ── CALENDARIO ────────────────────────────────────────────────────
function renderCalendario(id, meta, piezas){
  const DAYS=["LUN","MAR","MIÉ","JUE","VIE","SÁB","DOM"];
  const {startDay,totalDays,ciclos,actividades}=meta;
  const actMap=actividades||{};
  const pizMap={};
  piezas.forEach(p=>{
    const d=parseInt((p.fecha||"").split("/")[0]);
    if(!isNaN(d)){if(!pizMap[d])pizMap[d]=[];pizMap[d].push(p);}
  });
  let cal=`<div class="cal" style="grid-template-columns:auto repeat(7,1fr)">`;
  cal+=`<div class="cal-dh" style="border-radius:8px 0 0 0"></div>`;
  DAYS.forEach((d,i)=>cal+=`<div class="cal-dh"${i===6?' style="border-radius:0 8px 0 0"':''}>${d}</div>`);
  for(let w=0;w<4;w++){
    const c=ciclos[w]||{num:w+1,fase:"",tema:""};
    cal+=`<a href="#ciclo-${id}-${c.num}" class="cal-wk-lbl" data-month="${id}" data-widx="${w}"
      title="Doble clic para editar · Clic para ir al ciclo">
      <span class="wkl-num">C·${String(c.num).padStart(2,"0")}</span>
      <span class="wkl-fase">${c.fase}</span>
      <span class="wkl-name">${c.tema}</span>
    </a>`;
    for(let dd=0;dd<7;dd++){
      const day=w*7+dd-startDay+1;
      const valid=day>=1&&day<=totalDays;
      cal+=`<div class="cal-day${!valid?" other-month":""}">`;
      if(valid){
        cal+=`<span class="cal-dn">${day}</span>`;
        (actMap[String(day)]||[]).forEach(a=>cal+=`<span class="cal-pill ${cCal(a.c)}">${a.e.substring(0,20)}</span>`);
        (pizMap[day]||[]).slice(0,2).forEach(p=>cal+=`<span class="cal-pill ${cCal(p.canal)}">${(p.tema||"").split("–")[0].trim().substring(0,16)}</span>`);
      }
      cal+=`</div>`;
    }
  }
  cal+=`</div>`;

// ── HELPER: Google Calendar link ─────────────────────────────────
function gcalUrl(titulo, fechaStr){
  // fechaStr format: "DD/MM/YYYY" → convert to YYYYMMDD
  const parts=(fechaStr||"").split("/");
  let dateTag="";
  if(parts.length===3){
    const [d,m,y]=parts;
    const ds=y+m.padStart(2,"0")+d.padStart(2,"0");
    dateTag=`${ds}/${ds}`;
  }
  const t=encodeURIComponent(titulo||"Grabación Local Church");
  return `https://calendar.google.com/calendar/r/eventedit?text=${t}&dates=${dateTag}&details=${encodeURIComponent("Programado desde el Dashboard Local Church")}&sf=true`;
}

function buildMonth(id,apiPiezas){
  const meta=MONTHS_META[id];
  const next=MONTH_ORDER[MONTH_ORDER.indexOf(id)+1];
  let piezas=[];
  if(apiPiezas&&apiPiezas.length>0){
    piezas=apiPiezas.filter(p=>{const m=(p.fecha||"").split("/")[1];return m&&parseInt(m)===parseInt(meta.num);});
  }
  if(piezas.length===0&&meta.piezas&&meta.piezas.length>0) piezas=meta.piezas;

  let html=`<section class="month-view" id="month-${id}">`;
  html+=renderPortada(id,meta,piezas);
  html+=`<div class="divider"></div>`;
  html+=renderCalendario(id,meta,piezas);
  html+=`<div class="divider"></div>`;
  meta.ciclos.forEach((c,ci)=>{
    const prevC=ci>0?meta.ciclos[ci-1]:null;
    const nextC=ci<meta.ciclos.length-1?meta.ciclos[ci+1]:null;
    const cicPiezas=piezas.filter(p=>parseInt((p.ciclo||"0").replace(/\D/g,""),10)===c.num);
    html+=renderCicloSlide(id,meta,c,cicPiezas,prevC,nextC,!nextC,next);
    html+=`<div class="divider"></div>`;
    const grps={};
    cicPiezas.forEach(p=>{const k=p.grupo||("_"+p.id);if(!grps[k])grps[k]=[];grps[k].push(p);});
    const all=[];Object.values(grps).forEach(g=>g.forEach(p=>all.push(p)));
    let sc=0;
    Object.values(grps).forEach(grpPiezas=>{
      grpPiezas.forEach((p,pi)=>{sc++;html+=renderFicha(p,grpPiezas,pi,sc,all.length,id);html+=`<div class="divider"></div>`;});
    });
  });
  html+=renderGrabaciones(id,meta);
  html+=`<div class="divider"></div>`;
  html+=renderMetricas(id,meta);
  html+=`</section>`;
  return html;
}

// GOOGLE SHEETS READER — lectura directa via CSV export
// No requiere Apps Script. El Sheet debe ser público (ver con enlace)
// ══════════════════════════════════════════════════════════════════
function parseCSV(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim());
  return lines.map(line=>{
    const cells=[];let cur="",inQ=false;
    for(let i=0;i<line.length;i++){
      const ch=line[i];
      if(ch==='"'){if(inQ&&line[i+1]==='"'){cur+='"';i++;}else inQ=!inQ;}
      else if(ch===','&&!inQ){cells.push(cur.trim());cur="";}
      else cur+=ch;
    }
    cells.push(cur.trim());return cells;
  });
}

async function fetchSheetCSV(sheetId, sheetName, pubKey){
  // Construye todas las variantes de URL posibles en orden de preferencia
  const enc = encodeURIComponent(sheetName||"");
  const urls = [
    // 1. URL de publicación con clave /e/ (la más confiable para sheets publicados)
    pubKey && `https://docs.google.com/spreadsheets/d/e/${pubKey}/pub?output=csv&sheet=${enc}`,
    pubKey && `https://docs.google.com/spreadsheets/d/e/${pubKey}/pub?single=true&output=csv`,
    pubKey && `https://docs.google.com/spreadsheets/d/e/${pubKey}/pub?output=csv`,
    // 2. gviz con ID normal (funciona para sheets nativos compartidos)
    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&sheet=${enc}`,
    `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv`,
    // 3. export directo
    `https://docs.google.com/spreadsheets/d/${sheetId}/export?format=csv&sheet=${enc}`,
  ].filter(Boolean); // elimina nulls si pubKey no existe

  let lastErr;
  for(const url of urls){
    try{
      const res = await fetch(url, {cache:"no-store"});
      if(!res.ok) continue;
      const text = await res.text();
      // Descartar respuestas vacías o de error HTML
      if(text.trim().length < 20) continue;
      if(text.trim().startsWith("<!")) continue; // HTML de error
      return parseCSV(text);
    }catch(e){ lastErr=e; }
  }
  throw lastErr || new Error("Todas las URLs fallaron");
}

// ── Normaliza un encabezado: quita emojis, símbolos, espacios extra, pasa a minúsculas
function normHdr(h){
  return (h||"")
    .replace(/[\u{1F300}-\u{1FFFF}]/gu,"")   // emojis
    .replace(/[^\w\sáéíóúüñÁÉÍÓÚÜÑ]/g," ")  // símbolos → espacio
    .replace(/\s+/g," ")
    .toLowerCase()
    .trim();
}

// ── Tabla de sinónimos: cada campo puede tener múltiples variantes de nombre
const COL_SYNONYMS = {
  fecha:      ["fecha","date","dia","día","fecha salida","fecha publicacion","fecha publicación"],
  ciclo:      ["ciclo","semana","week","ciclo semana","semana ciclo","s1","s2","s3","s4"],
  serie:      ["serie","campaña","campaign","serie campana","serie campaña","nombre","tema","titulo","título"],
  fase:       ["fase","phase","fase del ciclo","fase ciclo","pilar"],
  audiencia:  ["audiencia","audience","publico","público","target"],
  formato:    ["formato","format","tipo de contenido","tipo contenido","tipo"],
  canal:      ["canal","channel","plataforma","platform","red","red social"],
  idea:       ["idea","idea de contenido","copy","guion","guión","descripcion","descripción","contenido","idea contenido"],
  cta:        ["cta","llamado a la accion","llamado a la acción","llamado accion","call to action"],
  kpi:        ["kpi","kpis","metrica","métrica","indicador","resultado esperado"],
  responsable:["responsable","responsables","encargado","asignado","assigned"],
  estado:     ["estado","status","progreso","aprobacion","aprobación"],
  linkDrive:  ["link","link drive","linkdrive","drive","archivo","url","enlace","link archivo","link de drive","link pieza"],
};

// ── Encuentra el índice de columna para un campo dado
function findCol(hdrsNorm, field){
  const synonyms = COL_SYNONYMS[field] || [field];
  // Exact match first
  for(const syn of synonyms){
    const idx = hdrsNorm.findIndex(h => h === syn);
    if(idx >= 0) return idx;
  }
  // Partial match (contains)
  for(const syn of synonyms){
    const idx = hdrsNorm.findIndex(h => h.includes(syn) || syn.includes(h));
    if(idx >= 0) return idx;
  }
  return -1;
}

// ── Parsea filas CSV → array de objetos pieza
function csvToPiezas(rows){
  // Busca la fila de cabecera: la primera que tenga ≥4 celdas no vacías
  let hIdx = rows.findIndex(r => r.filter(c=>c.trim()).length >= 4);
  if(hIdx < 0) hIdx = 0;

  // Normaliza encabezados
  const hdrsRaw  = rows[hIdx];
  const hdrsNorm = hdrsRaw.map(normHdr);

  // Detecta índices de cada campo
  const cols = {};
  for(const field of Object.keys(COL_SYNONYMS)){
    cols[field] = findCol(hdrsNorm, field);
  }

  // Debug: log column mapping al síncronizar
  console.log("📊 Sheet columnas detectadas:", hdrsRaw);
  console.log("📊 Mapeo de campos:", cols);

  const piezas=[];
  for(let i=hIdx+1; i<rows.length; i++){
    const r=rows[i];
    // Saltar filas completamente vacías o de separador
    if(r.filter(c=>c.trim()).length < 2) continue;

    // Extraer ciclo número
    const cicloRaw = cols.ciclo >= 0 ? (r[cols.ciclo]||"") : "";
    const cicloMatch = cicloRaw.match(/\d/);
    const cicloNum = cicloMatch ? cicloMatch[0] : "1";

    // Extraer fecha: quedarse solo con la parte DD/MM o DD
    const fechaRaw = cols.fecha >= 0 ? (r[cols.fecha]||"") : "";
    const fechaClean = fechaRaw
      .replace(/^(lun|mar|mié|jue|vie|sáb|dom|mon|tue|wed|thu|fri|sat|sun)[a-z]*[\s,.]*/i,"")
      .trim()
      .split(" ")[0];

    const tema = cols.serie >= 0 ? (r[cols.serie]||"").split(/[·\-–]/)[0].trim().substring(0,60) : `Pieza ${i}`;

    piezas.push({
      id: `ABR-C${cicloNum}-${String(i).padStart(3,"0")}`,
      ciclo: cicloNum,
      grupo: `G${cicloNum}`,
      tema,
      fecha: fechaClean,
      canal:       cols.canal       >= 0 ? r[cols.canal]       : "",
      formato:     cols.formato     >= 0 ? r[cols.formato]      : "Post estático",
      fase:        cols.fase        >= 0 ? r[cols.fase]         : "",
      audiencia:   cols.audiencia   >= 0 ? r[cols.audiencia]    : "",
      objetivo:    "",
      copy:        cols.idea        >= 0 ? r[cols.idea]         : "",
      cta:         cols.cta         >= 0 ? r[cols.cta]          : "",
      kpi:         cols.kpi         >= 0 ? r[cols.kpi]          : "",
      responsable: cols.responsable >= 0 ? r[cols.responsable]  : "",
      estado:      cols.estado      >= 0 ? (r[cols.estado]||"Pendiente") : "Pendiente",
      linkDrive:   cols.linkDrive   >= 0 ? r[cols.linkDrive]    : "",
    });
  }
  return piezas;
}

async function syncFromSheet(sheetId){
  const dot=document.getElementById("sdot");
  const lbl=document.getElementById("slbl");
  dot.className="sync-dot wait"; lbl.textContent="Conectando con Sheet…";

  const pubKey = PUB_KEY || localStorage.getItem("lc-pub-key") || "";

  // Todos los nombres posibles de pestaña
  const sheetNames=[
    "📅 Parrilla Abril 2026",
    "Parrilla Abril 2026",
    "Parrilla de Contenidos",
    "Parrilla",
    "Contenidos",
    "Abril 2026",
    "Abril",
    "Hoja 1","Hoja1","Sheet1","Sheet 1",
  ];

  const results = [];
  let foundRows = null;
  let foundName = "";

  // ── Intento 1: URL de publicación sin nombre de hoja (primera hoja)
  if(pubKey){
    try{
      const rows = await fetchSheetCSV(sheetId, "", pubKey);
      if(rows.length >= 2){
        const p = csvToPiezas(rows);
        results.push({name:"(primera hoja)", rows, piezas:p,
          headers: rows.find(r=>r.filter(c=>c.trim()).length>=3)||[]});
        if(p.length>0){ foundRows=rows; foundName="(primera hoja)"; }
      }
    }catch(e){}
  }

  // ── Intento 2: por nombre de hoja con pubKey y sin pubKey
  if(!foundRows){
    for(const name of sheetNames){
      try{
        const rows = await fetchSheetCSV(sheetId, name, pubKey);
        if(rows.length >= 2){
          const p = csvToPiezas(rows);
          results.push({name, rows, piezas:p,
            headers: rows.find(r=>r.filter(c=>c.trim()).length>=3)||[]});
          if(p.length>0 && !foundRows){ foundRows=rows; foundName=name; }
        }
      }catch(e){}
    }
  }

  // ── Intento 3: por GID numérico con pubKey
  if(!foundRows && pubKey){
    for(let gid=0; gid<=5; gid++){
      try{
        const url=`https://docs.google.com/spreadsheets/d/e/${pubKey}/pub?output=csv&gid=${gid}`;
        const res=await fetch(url,{cache:"no-store"});
        if(!res.ok) continue;
        const text=await res.text();
        if(text.trim().length<20||text.trim().startsWith("<!")) continue;
        const rows=parseCSV(text);
        if(rows.length>=2){
          const p=csvToPiezas(rows);
          const name=`gid=${gid}`;
          results.push({name, rows, piezas:p,
            headers:rows.find(r=>r.filter(c=>c.trim()).length>=3)||[]});
          if(p.length>0 && !foundRows){ foundRows=rows; foundName=name; }
        }
      }catch(e){}
    }
  }

  // ── Intento 4: GID por gviz sin nombre
  if(!foundRows){
    for(let gid=0; gid<=4; gid++){
      try{
        const url=`https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:csv&gid=${gid}`;
        const res=await fetch(url,{cache:"no-store"});
        if(!res.ok) continue;
        const text=await res.text();
        if(text.trim().length<20||text.trim().startsWith("<!")) continue;
        const rows=parseCSV(text);
        if(rows.length>=2){
          const p=csvToPiezas(rows);
          const name=`gviz gid=${gid}`;
          results.push({name, rows, piezas:p,
            headers:rows.find(r=>r.filter(c=>c.trim()).length>=3)||[]});
          if(p.length>0 && !foundRows){ foundRows=rows; foundName=name; }
        }
      }catch(e){}
    }
  }

  // ── Resultado
  if(foundRows && foundName){
    const piezas=csvToPiezas(foundRows);
    MONTHS_META.abril.piezas=piezas;

    // ── Sync otros meses + Grabaciones + Métricas en paralelo
    (async()=>{
      const pub = PUB_KEY;
      const base = `https://docs.google.com/spreadsheets/d/e/${pub}/pub?output=csv&gid=`;
      const MGIDS = {"mayo": 804464204, "junio": 1480501652, "julio": 925897179, "agosto": 1291713398, "septiembre": 1049610183, "octubre": 1101962404, "noviembre": 1823568121, "diciembre": 196070214};
      for(const [mid, gid] of Object.entries(MGIDS)){
        try{
          const res=await fetch(base+gid,{cache:"no-store"});
          const text=await res.text();
          if(text.trim().length>20&&!text.trim().startsWith("<!")){
            const p=csvToPiezas(parseCSV(text));
            if(p.length>0){
              MONTHS_META[mid].piezas=p;
              const el=document.getElementById("month-"+mid);
              if(el){el.remove();BUILT[mid]=false;}
              console.log("✅",mid,p.length,"piezas");
            }
          }
        }catch(e){console.warn(mid,e.message);}
      }
      try{
        const res=await fetch(base+417621751,{cache:"no-store"});
        const text=await res.text();
        if(text.trim().length>20&&!text.trim().startsWith("<!")){
          const rows=parseCSV(text);
          const hi=rows.findIndex(r=>r.some(c=>/mes|fecha/i.test(c)));
          if(hi>=0){
            const grabs=rows.slice(hi+1).filter(r=>(r[1]||"").trim()).map(r=>{
              return {mes:(r[0]||"").trim(),fecha:(r[1]||"").trim(),
                sesion:(r[2]||"").trim(),tipo:(r[3]||"").trim(),
                encargado:(r[4]||"").trim(),entrega:(r[5]||"").trim(),
                estado:(r[6]||"Pendiente").trim(),linkDrive:(r[7]||"").trim()};
            });
            Object.keys(MONTHS_META).forEach(mid=>{
              const label=(MONTHS_META[mid].label||"").toLowerCase();
              MONTHS_META[mid].grabaciones=grabs.filter(g=>{
                const gm=(g.mes||"").toLowerCase();
                return gm.includes(mid)||label.includes(gm);
              });
            });
            console.log("✅ Grabaciones:",grabs.length);
          }
        }
      }catch(e){console.warn("Grabaciones:",e.message);}
      try{
        const res=await fetch(base+1153647020,{cache:"no-store"});
        const text=await res.text();
        if(text.trim().length>20&&!text.trim().startsWith("<!")){
          const rows=parseCSV(text);
          const hi=rows.findIndex(r=>r.some(c=>/mes|seguidores/i.test(c)));
          if(hi>=0){
            rows.slice(hi+1).forEach(r=>{
              const mes=(r[0]||"").toLowerCase().trim();
              const mid=Object.keys(MONTHS_META).find(m=>mes.includes(m)||m.includes(mes));
              if(mid&&MONTHS_META[mid]){
                if(!MONTHS_META[mid].metricas)MONTHS_META[mid].metricas={};
                Object.assign(MONTHS_META[mid].metricas,{
                  seguidores_ig:(r[1]||"").trim(),alcance:(r[2]||"").trim(),
                  seguidores_fb:(r[3]||"").trim(),subs_yt:(r[4]||"").trim(),
                  engagement:(r[5]||"").trim()
                });
              }
            });
            console.log("✅ Métricas ok");
          }
        }
      }catch(e){console.warn("Métricas:",e.message);}
    })();
    const el=document.getElementById("month-abril"); if(el) el.remove();
    BUILT["abril"]=false;
    showMonth("abril",false);
    dot.className="sync-dot ok";
    lbl.textContent=`✓ ${piezas.length} piezas · hoja "${foundName}" · ${new Date().toLocaleTimeString("es-CO",{hour:"2-digit",minute:"2-digit"})}`;
    const sheetUrl=`https://docs.google.com/spreadsheets/d/${sheetId}/edit`;
    ["nav-sheet","drawer-sheet"].forEach(id=>{const el=document.getElementById(id);if(el)el.href=sheetUrl;});
    removeDiagPanel();
  }else{
    dot.className="sync-dot err";
    lbl.textContent="Sin datos · ver panel de diagnóstico ↓";
    showDiagPanel(sheetId, results);
  }
}

// ── Panel de diagnóstico visual ────────────────────────────────────
function removeDiagPanel(){
  const old=document.getElementById("diag-panel"); if(old) old.remove();
}

function showDiagPanel(sheetId, results){
  removeDiagPanel();
  const panel=document.createElement("div");
  panel.id="diag-panel";
  panel.style.cssText=`
    position:fixed;bottom:0;left:0;right:0;z-index:9999;
    background:#fff;border-top:2px solid #6B21D6;
    font-family:'Nunito',sans-serif;font-size:13px;color:#1A0A2E;
    max-height:55vh;overflow-y:auto;
    box-shadow:0 -4px 24px rgba(107,33,214,.15);
  `;

  const hdrsFound = results.map(r=>
    `<div style="margin:6px 0;padding:8px 12px;background:#F5F3FF;border-radius:6px;border:1px solid rgba(107,33,214,.15)">
      <strong style="color:#6B21D6">Hoja: "${r.name}"</strong>
      ${r.piezas.length>0
        ? `<span style="margin-left:8px;color:#059669;font-weight:700">✓ ${r.piezas.length} piezas detectadas</span>`
        : `<span style="margin-left:8px;color:#B45309">⚠ 0 piezas</span>`}
      <br>
      <span style="color:#7C6FA0;font-size:11px">Encabezados: ${r.headers.filter(h=>h.trim()).slice(0,15).map(h=>`<code style="background:#EDE9FE;padding:1px 5px;border-radius:3px;margin:1px;display:inline-block">${h}</code>`).join(" ")}</span>
    </div>`
  ).join("") || `<div style="color:#B45309;padding:8px">No se encontró ninguna hoja accesible. Verifica que el Sheet esté publicado (ver instrucciones abajo).</div>`;

  panel.innerHTML=`
    <div style="padding:14px 20px;display:flex;align-items:center;justify-content:space-between;
      border-bottom:1px solid rgba(107,33,214,.1);background:#F5F3FF;">
      <div style="font-weight:800;color:#6B21D6;font-size:14px">🔍 Diagnóstico de conexión con Google Sheet</div>
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="syncFromSheet('${sheetId}')"
          style="background:#6B21D6;color:#fff;border:none;border-radius:7px;padding:6px 14px;
          font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">
          🔄 Reintentar
        </button>
        <button onclick="document.getElementById('diag-panel').remove()"
          style="background:#F5F3FF;color:#6B21D6;border:1px solid rgba(107,33,214,.3);
          border-radius:7px;padding:6px 12px;font-size:12px;font-weight:700;
          cursor:pointer;font-family:'Nunito',sans-serif">✕ Cerrar</button>
      </div>
    </div>
    <div style="padding:14px 20px">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">

        <div>
          <div style="font-weight:700;color:#4B3B6B;margin-bottom:8px">📋 Hojas encontradas y sus encabezados</div>
          ${hdrsFound}
        </div>

        <div>
          <div style="font-weight:700;color:#4B3B6B;margin-bottom:8px">✅ Pasos para activar la sincronización</div>
          <div style="background:#F0FDF4;border:1px solid rgba(5,150,105,.2);border-radius:8px;padding:12px;font-size:12px;line-height:1.8">
            <strong>1. Publicar el Sheet en la web</strong><br>
            Archivo → Compartir → Publicar en la web → Toda la hoja → Publicar<br><br>
            <strong>2. Verificar nombre de la hoja</strong><br>
            La pestaña debe llamarse exactamente:<br>
            <code style="background:#EDE9FE;padding:2px 7px;border-radius:4px;font-size:11px">📅 Parrilla Abril 2026</code>
            o simplemente
            <code style="background:#EDE9FE;padding:2px 7px;border-radius:4px;font-size:11px">Parrilla Abril 2026</code><br><br>
            <strong>3. Pegar nombre real de la pestaña aquí:</strong><br>
            <input id="diag-sheet-name" placeholder="Escribe el nombre exacto de la pestaña…"
              style="width:100%;margin-top:4px;padding:6px 10px;border:1.5px solid rgba(107,33,214,.3);
              border-radius:6px;font-family:'Nunito',sans-serif;font-size:12px;outline:none">
            <button onclick="syncWithCustomName('${sheetId}')"
              style="margin-top:6px;width:100%;background:#6B21D6;color:#fff;border:none;
              border-radius:6px;padding:7px;font-size:12px;font-weight:700;cursor:pointer;
              font-family:'Nunito',sans-serif">
              🔄 Sincronizar con este nombre
            </button>
          </div>

          <div style="margin-top:12px;background:#FFF7ED;border:1px solid rgba(234,88,12,.2);border-radius:8px;padding:12px;font-size:12px;line-height:1.7">
            <strong style="color:#9A3412">💡 El Sheet fue subido como .xlsx</strong><br>
            Google Sheets requiere que el archivo esté en formato nativo (no .xlsx) para lectura pública CSV.<br><br>
            <strong>Solución rápida:</strong> En el Sheet abierto →<br>
            Archivo → Guardar como Google Sheets (no como .xlsx)<br>
            Luego Archivo → Publicar en la web
          </div>
        </div>

      </div>
    </div>
  `;
  document.body.appendChild(panel);
}

// Sync con nombre personalizado escrito en el diagnóstico
async function syncWithCustomName(sheetId){
  const inp=document.getElementById("diag-sheet-name");
  const name=(inp&&inp.value.trim())||"";
  if(!name){ inp&&inp.focus(); return; }
  const dot=document.getElementById("sdot");
  const lbl=document.getElementById("slbl");
  const pubKey=PUB_KEY||localStorage.getItem("lc-pub-key")||"";
  dot.className="sync-dot wait"; lbl.textContent=`Buscando "${name}"…`;
  try{
    const rows=await fetchSheetCSV(sheetId, name, pubKey);
    const piezas=csvToPiezas(rows);
    if(piezas.length>0){
      MONTHS_META.abril.piezas=piezas;
      const el=document.getElementById("month-abril"); if(el) el.remove();
      BUILT["abril"]=false;
      showMonth("abril",false);
      dot.className="sync-dot ok";
      lbl.textContent=`✓ ${piezas.length} piezas · "${name}"`;
      removeDiagPanel();
    }else{
      dot.className="sync-dot err";
      lbl.textContent=`Hoja "${name}" encontrada pero sin piezas. Revisa encabezados.`;
      await syncFromSheet(sheetId);
    }
  }catch(e){
    dot.className="sync-dot err";
    lbl.textContent=`Error: ${e.message.substring(0,50)}`;
  }
}

function promptSheetId(){
  const cur=localStorage.getItem("lc-sheet-id")||"";
  const nu=prompt(
    "📊 CONECTAR GOOGLE SHEET\n\n"+
    "Pega el ID de tu Google Sheet.\n"+
    "El ID está en la URL: docs.google.com/spreadsheets/d/ >> ID << /edit\n\n"+
    "⚠️ El Sheet debe estar compartido como:\n'Cualquier persona con el enlace puede VER'",
    cur
  );
  if(nu&&nu.trim()){
    const id=nu.trim().replace(/^https?:\/\/.+spreadsheets\/d\//,"").split("/")[0];
    localStorage.setItem("lc-sheet-id",id);
    SHEET_ID=id;
    syncFromSheet(id);
  }
}

// ── Botón de conexión rápida en el banner ──────────────────────────
function renderSetupBanner(){
  if(SHEET_ID) return "";
  return `<div class="setup-banner">
    <div style="flex:1;min-width:260px">
      <div class="sb-title">📊 Conecta tu Google Sheet para sincronizar en tiempo real</div>
      <div class="sb-text">
        1. Sube el archivo <strong>Local_Church_Parrilla_Abril_2026.xlsx</strong> a Google Drive<br>
        2. Ábrelo como Google Sheet (doble clic → "Abrir con Google Sheets")<br>
        3. Compártelo: <strong>Cualquier persona con el enlace puede ver</strong><br>
        4. Copia el ID de la URL y pégalo aquí abajo:<br>
        <span style="font-family:'DM Mono',monospace;font-size:.7rem;color:var(--vl)">docs.google.com/spreadsheets/d/<strong style="color:var(--y)">[ ID AQUÍ ]</strong>/edit</span>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px;min-width:260px">
      <input class="sb-input" id="sheet-id-inp" placeholder="Pega el ID del Sheet aquí…"
        value="${localStorage.getItem('lc-sheet-id')||''}">
      <button class="sb-btn" onclick="connectSheet()">🔗 Conectar Sheet</button>
    </div>
  </div>`;
}

function connectSheet(){
  const inp=document.getElementById("sheet-id-inp");
  if(!inp) return;
  const raw=inp.value.trim();
  if(!raw){alert("Por favor pega el ID del Sheet.");return;}
  const id=raw.replace(/^https?:\/\/.+spreadsheets\/d\//,"").split("/")[0];
  localStorage.setItem("lc-sheet-id",id);
  SHEET_ID=id;
  syncFromSheet(id);
  // Remove banner
  const b=document.getElementById("setup-banner-el");if(b)b.remove();
}

// ══════════════════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════════════════
async function init(){
  const dot=document.getElementById("sdot");
  const lbl=document.getElementById("slbl");
  const mainEl=document.getElementById("main");

  // Build Abril immediately with embedded data
  mainEl.innerHTML = buildMonth("abril",null);
  BUILT["abril"]=true;
  document.getElementById("month-abril").classList.add("on");

  setTimeout(()=>{
    initCharts("abril",MONTHS_META["abril"],MONTHS_META["abril"].piezas||[]);
    initWeekEditing();
    if(window.LC_METRICAS) populateMetricas("abril",window.LC_METRICAS);
  },200);

  initExtLinks();
  setupExtLinks();

  // Auto-sync from Google Sheet (ID pre-configurado)
  dot.className="sync-dot wait"; lbl.textContent="Sincronizando con Sheet…";
  await syncFromSheet(SHEET_ID);
}

init();
</script>
